<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morse code translator</title>
    <link rel="stylesheet" href="styles/output.css">
</head>
<style>
</style>

<body class="p-0 m-0 box-border flex flex-col bg-black text-[#a0f7a0]">

    <div class="w-full h-screen
     justify-center items-center flex flex-col  gap-2 ">
        <h1 class="uppercase font-bold text-3xl bg-black w-1/3 text-center tracking-wider 
       text-green-400 drop-shadow-[0_0_10px_#00ff7f]
       border-b border-green-500 
       animate-pulse-slow "> Morse Code Translator
        </h1>
        <textarea id="input1" class="command-prompt w-1/2 h-1/6 px-3 py-2  shadow-green-500 border-gray-300 bg-black text-green-500 rounded-md shadow-sm 
                         focus:outline-none resize-y min-h-[50px]  
                         mb-2" title="input" placeholder="english"></textarea>

        <textarea id="input2" class="w-1/2 h-1/6 px-3 py-2  text-green-500 shadow-green-500 border-gray-300 rounded-md shadow-sm 
                         focus:outline-none 
                         resize-y min-h-[50px] 
                         mb-2 bg-black cursor-default" title="output" placeholder="morse code" disabled></textarea>
        <div class="command-prompt text-center py-4 w-1/3
             text-green-400 tracking-widest
            bg-black border-t border-green-600
            shadow-[0_-0_15px_#00ff7f] 
            drop-shadow-[0_0_10px_#00ff7f]
            uppercase text-sm">
            Coded by Mohammad Mesgarzadeh 2026
        </div>

        <footer class="flex h-20 mt-10 w-full items-center justify-center 
        bg-black border-t border-green-600 shadow-[0_-0_20px_#00ff7f]">

            <!-- GitHub -->
            <a class="w-12 h-12 rounded-full border border-green-500 shadow-[0_0_10px_#00ff7f]
        bg-black hover:shadow-[0_0_20px_#00ff7f] transition transform hover:-translate-y-2 cursor-pointer p-2"
                href="https://github.com/mohammad-mesgarzadeh">
                <img src="images/icons/GitHub.png" alt="" class="invert">
            </a>

            <!-- Linkedin -->
            <a class="w-12 h-12 rounded-full border border-green-500 shadow-[0_0_10px_#00ff7f]
        bg-black hover:shadow-[0_0_20px_#00ff7f] transition transform hover:-translate-y-2 cursor-pointer p-2 mx-3"
                href="https://www.linkedin.com/in/mohammad-mesgarzadeh-a5422837a/">
                <img src="images/icons/Linkedin(black&white).png" alt="" class="invert">
            </a>

            <!-- Email -->
            <div class="group relative inline-block mx-3">
                <div class="absolute left-1/2 -translate-x-1/2 bottom-full mb-2
            bg-black border border-green-500 text-green-300 text-sm font-semibold py-2 px-3 rounded-lg shadow-[0_0_10px_#00ff7f]
            opacity-0 scale-90 group-hover:opacity-100 group-hover:scale-100
            transition-all duration-300 pointer-events-none whitespace-nowrap">
                    m_mesgarzade@yahoo.com
                </div>
                <div class="w-12 h-12 rounded-full border border-green-500 shadow-[0_0_10px_#00ff7f] bg-black
            hover:shadow-[0_0_20px_#00ff7f] transition transform group-hover:-translate-y-2 cursor-pointer p-2">
                    <img src="images/icons/email.png" class="w-full h-full object-contain invert" alt="">
                </div>
            </div>

            <!-- Phone -->
            <div class="group relative inline-block">
                <div class="absolute left-1/2 -translate-x-1/2 bottom-full mb-2
            bg-black border border-green-500 text-green-300 text-sm font-semibold py-2 px-3 rounded-lg shadow-[0_0_10px_#00ff7f]
            opacity-0 scale-90 group-hover:opacity-100 group-hover:scale-100
            transition-all duration-300 pointer-events-none whitespace-nowrap">
                    09336153916
                </div>
                <div
                    class="w-12 h-12 rounded-full border border-green-500 shadow-[0_0_10px_#00ff7f]
            bg-black hover:shadow-[0_0_20px_#00ff7f] transition transform group-hover:-translate-y-2 cursor-pointer p-2 mx-3">
                    <img src="images/icons/Phone.png" class="w-full h-full object-contain invert" alt="">
                </div>
            </div>

        </footer>

        <canvas id="matrix" class="fixed top-0 left-0 w-full h-full z-[-1] bg-black"></canvas>


    </div>



    <script src="app.js"></script>

</body>

</html>
